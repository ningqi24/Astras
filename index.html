    init() {
      window.addEventListener("mousemove", this.move.bind(this));

    },
    move(e) {
      let x = e.clientX;
      let y = e.clientY;
      if (this.current_target) {
        const rect = this.current_target.getBoundingClientRect();
        const center_x = rect.left + rect.width / 2;
        const center_y = rect.top + rect.height / 2;
        x = center_x + (x - center_x) * 0.05;
        y = center_y + (y - center_y) * 0.05;
      }
      this.container.style.transform = `translate(${x}px, ${y}px)`;
    },
    bind_targets_events() {
      const targets = document.querySelectorAll("a, button, select, .featureCard, .OnlineButton, .DesktopButton, .tabButton, .download-card, .download-item, .proxy-option, .other-menu-item");
      targets.forEach(ele => {
        ele.classList.add("magnetic-target");
        ele.onmouseenter = () => {
          this.current_target = ele;
          const rect = ele.getBoundingClientRect();
          this.container.style.setProperty("--width", rect.width + innerWidth / 50 + "px");
          this.container.style.setProperty("--height", rect.height + innerWidth / 50 + "px");
        };
        ele.onmouseleave = () => {
          this.current_target = null;
          this.container.style.setProperty("--width", "2.5rem");
          this.container.style.setProperty("--height", "2.5rem");

      });
    }

  function detectArch(filename, platform) {
    const name = filename.toLowerCase();
    if (platform === 'windows') {
      if (name.includes('amd64') || name.includes('x86_64') || name.includes('x64') || name.includes('64bit') || name.includes('win64')) return 'x64';
      if (name.includes('i386') || name.includes('i686') || name.includes('x86') || name.includes('win32') || name.includes('ia32')) return 'x86';
      if (name.includes('arm64') || name.includes('aarch64')) return 'arm64';
      return 'x64';
    } else if (platform === 'macos') {
      if (name.includes('arm64') || name.includes('aarch64') || name.includes('apple-silicon') || name.includes('macos-arm')) return 'arm';
      if (name.includes('x64') || name.includes('x86_64') || name.includes('intel') || name.includes('macos-x64')) return 'x64';
      return 'x64';
    } else {
      if (name.includes('amd64') || name.includes('x86_64') || name.includes('x64') || name.includes('64bit')) return 'amd';
      if (name.includes('arm64') || name.includes('aarch64') || name.includes('armv8')) return 'arm';
      if (name.includes('armhf') || name.includes('armv7') || name.includes('armv6') || name.includes('rpi') || name.includes('hf')) return 'arm32';
      return 'amd';
    }
  }

  function detectSuffix(filename, platform) {
    const name = filename.toLowerCase();
    if (platform === 'windows') {
      if (name.endsWith('.exe')) return 'exe';
      if (name.endsWith('.msi')) return 'msi';
      if (name.endsWith('.appx') || name.endsWith('.appxBundle')) return 'appx';
      if (name.endsWith('.zip')) return 'zip';
      return 'other';
    } else if (platform === 'macos') {
      if (name.endsWith('.dmg')) return 'dmg';
      if (name.endsWith('.pkg')) return 'pkg';
      if (name.endsWith('.zip')) return 'zip';
      return 'other';
    } else {
      if (name.endsWith('.deb')) return 'deb';
      if (name.endsWith('.rpm')) return 'rpm';
      if (name.endsWith('.appimage') || name.includes('appimage')) return 'appimage';
      if (name.endsWith('.tar.gz') || name.endsWith('.tgz')) return 'tar';
      if (name.endsWith('.tar.xz') || name.endsWith('.txz')) return 'tarxz';
      if (name.endsWith('.sh') || name.includes('-sh-')) return 'sh';
      if (name.endsWith('.bin')) return 'bin';
      if (name.endsWith('.zip')) return 'zip';
      return 'other';
    }
  }

  function selectFilter(value) {
    const archValues = ['amd', 'arm', 'arm32', 'x64', 'x86', 'arm64'];
    const suffixValues = ['deb', 'rpm', 'appimage', 'tar', 'tarxz', 'sh', 'bin', 'zip', 'exe', 'msi', 'dmg', 'pkg', 'appx'];

    const allTab = document.querySelector('.filter-tab[data-i18n="全部"]');

    if (value === 'all') {
      currentArch = 'all';
      currentSuffix = 'all';
      document.querySelectorAll('.filter-tab').forEach(tab => {
        tab.classList.remove('active');
      });
      if (allTab) {
        allTab.classList.add('active');
      }
    } else if (archValues.includes(value)) {
      const tab = document.querySelector(`.filter-tab[data-i18n="${value}"]`);
      if (tab) {
        if (tab.classList.contains('active')) {
          tab.classList.remove('active');
        } else {
          document.querySelectorAll('.filter-tab').forEach(t => {
            const tabValue = t.getAttribute('data-i18n');
            if (archValues.includes(tabValue)) {
              t.classList.remove('active');
            }
          });
          tab.classList.add('active');
        }
      }
      if (allTab) {
        allTab.classList.remove('active');
      }
    } else if (suffixValues.includes(value)) {
      const tab = document.querySelector(`.filter-tab[data-i18n="${value}"]`);
      if (tab) {
        if (tab.classList.contains('active')) {
          tab.classList.remove('active');
        } else {
          document.querySelectorAll('.filter-tab').forEach(t => {
            const tabValue = t.getAttribute('data-i18n');
            if (suffixValues.includes(tabValue)) {
              t.classList.remove('active');
            }
          });
          tab.classList.add('active');
        }
      }
      if (allTab) {
        allTab.classList.remove('active');
      }
    }

    let activeArch = 'all';
    let activeSuffix = 'all';

    document.querySelectorAll('.filter-tab.active').forEach(tab => {
      const tabValue = tab.getAttribute('data-i18n');
      if (archValues.includes(tabValue)) {
        activeArch = tabValue;
      } else if (suffixValues.includes(tabValue)) {
        activeSuffix = tabValue;
      }

    currentArch = activeArch;
    currentSuffix = activeSuffix;

    const activeTabs = document.querySelectorAll('.filter-tab.active');
    const hasActiveFilters = activeTabs.length > 0 && !document.querySelector('.filter-tab.active[data-i18n="全部"]');

    if (!hasActiveFilters && activeTabs.length === 0) {
      currentArch = 'all';
      currentSuffix = 'all';
      document.querySelectorAll('.filter-tab').forEach(tab => {
        tab.classList.remove('active');
      });
      if (allTab) {
        allTab.classList.add('active');
      }
    }

    filterDownloadItems();
  }

  function getClientLocation() {
    return new Promise((resolve) => {
      if ('geolocation' in navigator) {
        navigator.geolocation.getCurrentPosition(
          (position) => {
            resolve({
              latitude: position.coords.latitude,
              longitude: position.coords.longitude,
              country: null
            });
          },
          (error) => {
            console.log('Geolocation error:', error);
            resolve(null);
          },
          { timeout: 5000 }
        );
      } else {
        resolve(null);
      }
    });
  }

          case 'SG':
            optimalProxy = 'ghproxy.net';
            break;
          case 'HK':
            optimalProxy = 'goproxy';
            break;
          case 'TW':
            optimalProxy = 'goproxy';
            break;
          default:
            optimalProxy = 'ghproxy.net';
        }
      }
      
      if (!localStorage.getItem('selectedProxy')) {
        selectProxy(optimalProxy);
      }
    });
  }

  function testProxyLatency(proxy) {
    return new Promise((resolve) => {
      if (proxy.name === 'github') {
        resolve({ proxy: proxy.name, latency: Infinity });
        return;
      }
      
      const startTime = performance.now();
      const testUrl = proxy.prefix + 'https://github.com/AstraEditor/Desktop';
      
      fetch(testUrl, { method: 'HEAD', signal: AbortSignal.timeout(3000) })
        .then(() => {
          const endTime = performance.now();
          resolve({ proxy: proxy.name, latency: endTime - startTime });
        })
        .catch(() => {
          resolve({ proxy: proxy.name, latency: Infinity });
        });
    });
  }

  async function findFastestProxy() {
    const testPromises = proxyList.slice(0, -1).map(testProxyLatency);
    const results = await Promise.all(testPromises);
    
    results.sort((a, b) => a.latency - b.latency);
    
    return results[0] && results[0].latency < Infinity ? results[0].proxy : 'ghproxy.net';
  }

  async function autoSelectFastestProxy() {
    try {
      const fastestProxy = await findFastestProxy();
      selectProxy(fastestProxy);

  }

  let allReleases = [];
  let currentReleaseIndex = 0;

  async function loadDownloadsWithProxy() {
    try {
      const response = await fetch('public/releases.json');
      const data = await response.json();

      if (!data.hasRelease || !data.releases || data.releases.length === 0) {
        document.getElementById('download-cards').innerHTML = `<p style="color:#888;text-align:center;">${translations[currentLang]['暂无下载资源']}</p>`;
        return;
      }

      allReleases = data.releases;
      currentReleaseIndex = 0;
      
      await loadReleaseData(currentReleaseIndex);
    } catch (err) {
      console.error('加载下载数据失败:', err);
      document.getElementById('download-cards').innerHTML = `<p style="color:#888;text-align:center;">${translations[currentLang]['加载失败，请刷新重试']}</p>`;
    }
  }

  async function loadReleaseData(releaseIndex) {
    if (releaseIndex < 0 || releaseIndex >= allReleases.length) {
      return;
    }

    currentReleaseIndex = releaseIndex;
    const release = allReleases[releaseIndex];
    const proxyPrefix = getProxyPrefix();
    
    const categorized = {
      windows: [],
      macos: [],
      linux: [],
      source: []
    };

    release.assets.forEach(asset => {
      const name = asset.name.toLowerCase();
      const proxiedUrl = proxyPrefix ? proxyPrefix + asset.original_url : asset.original_url;
      const assetWithProxy = { ...asset, proxied_url: proxiedUrl };
      if (name.includes('.exe') || name.includes('.appx') || name.includes('windows')) {
        categorized.windows.push(assetWithProxy);
      } else if (name.includes('.dmg') || name.includes('macos')) {
        categorized.macos.push(assetWithProxy);
      } else if (name.includes('.appimage') || name.includes('.deb') || name.includes('.rpm') || name.includes('linux')) {
        categorized.linux.push(assetWithProxy);
      } else if (name.includes('source') || name.includes('源码') || name.includes('.tar.gz')) {
        categorized.source.push(assetWithProxy);
      }
    });

    downloadData = categorized;

    let html = '<div class="release-selector">';
    html += '<select id="release-select" onchange="changeRelease(this.value)">';
    allReleases.forEach((rel, index) => {
      html += `<option value="${index}" ${index === releaseIndex ? 'selected' : ''}>${rel.tag_name} (${new Date(rel.published_at).toLocaleDateString()})</option>`;
    });
    html += '</select>';
    html += '</div>';

    const cards = [
      { key: 'windows', name: translations[currentLang]['Windows 下载'], assets: categorized.windows },
      { key: 'macos', name: translations[currentLang]['macOS 下载'], assets: categorized.macos },
      { key: 'linux', name: translations[currentLang]['Linux 下载'], assets: categorized.linux },
      { key: 'source', name: translations[currentLang]['源码'], assets: categorized.source }
    ];

    let delay = 0.1;
    cards.forEach(card => {
      if (card.assets.length > 0 || card.key === 'source') {
        html += `<div class="download-card fade-in-up magnetic-target" style="animation-delay: ${delay}s" onclick="switchPlatform('${card.key}')">`;
        html += `<div class="download-name" data-i18n="${card.key === 'source' ? '源码' : ''}">${card.name}</div>`;
        html += '</div>';
        delay += 0.1;
      }
    });

    html += `<div class="download-panel" id="download-panel">`;
    html += `<div class="download-panel-inner">`;
    html += `<div class="download-panel-title" id="download-panel-title" ></div>`;
    html += `<div class="download-items" id="download-items"></div>`;
    html += '</div></div>';

    document.getElementById('download-cards').innerHTML = html;

    if (typeof pointer !== 'undefined') {
      pointer.bind_targets_events();
    }
  }

  function initAeScrollEffect() {
    const bgAe = document.querySelector('.bg-ae');
    if (!bgAe) return;

    function handleScroll() {
      const scrollY = window.scrollY;
      const windowHeight = window.innerHeight;
      const documentHeight = Math.max(
        document.body.scrollHeight,
        document.body.offsetHeight,
        document.documentElement.clientHeight,
        document.documentElement.scrollHeight,
        document.documentElement.offsetHeight
      );
      const scrollableHeight = documentHeight - windowHeight;
      
      if (scrollableHeight > 0) {
        const scrollProgress = scrollY / scrollableHeight;
        
        const translateX = (scrollProgress * 2 - 1) * 27;
        const translateY = Math.sin(scrollProgress * Math.PI) * 27;
        
        bgAe.style.transform = `translate(-50%, -50%) translateX(${translateX}vmax) translateY(${translateY}vmax)`;
      }
    }

    window.addEventListener('scroll', handleScroll);
    handleScroll();
  }</script>
