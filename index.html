  <style>
    :root {
      --bg-color: #111;
      --bg-secondary: #222;
      --text-primary: #eee;
      --text-secondary: #888;
      --accent-color: #66ccff;
      --scrollbar-thumb: #666;

      --font-weight: 500;
      --font-weight-bold: 700;
    }

    ::-webkit-scrollbar {
      background-color: var(--bg-color);
    }

    ::-webkit-scrollbar-thumb {
      background-color: var(--scrollbar-thumb);
    }

    ::-webkit-scrollbar-thumb:hover {
      background-color: var(--scrollbar-thumb-hover);
    }

    ::-webkit-scrollbar-thumb:active {
      background-color: var(--scrollbar-thumb-active);
    }

    * {
      box-sizing: border-box;
      font-weight: 500;
      -webkit-tap-highlight-color: transparent;
      touch-action: manipulation;
    }

    body {
      position: relative;
      overflow-x: hidden;
      font-weight: 500;
      background-color: var(--bg-color);
      color: var(--text-primary);
      -webkit-text-size-adjust: 100%;
    }

    h1, h2, h3, h4, h5, h6 {
      font-weight: 700;
    }

    img {
      max-width: 100%;
    }

    .blueprint-bg {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: -100;
      background: linear-gradient(90deg, #12181c11 10px, transparent 10px), linear-gradient(#12181c11 10px, transparent 10px);
      background-size: 50px 50px;
      animation: blueprintMove 20s linear infinite;
    }

    @keyframes blueprintMove {
      0% {
        background-position: 0 0;
      }

      100% {
        background-position: 50px 50px;
      }
    }

    .slogan {
      color: #fff;
      font-family: "Mi Sans", "Segoe UI", "Microsoft YaHei", "PingFang SC", -apple-system, BlinkMacSystemFont, sans-serif;
      font-size: 70px;
      font-weight: bold;
      text-shadow: 10px 10px 20px #111;
      white-space: nowrap;
      display: inline-block;
      animation: blink-caret 0.75s step-end infinite;
      overflow: hidden;
      will-change: width;
      transition: width 1.6s cubic-bezier(0.76, 0, 0.42, 0.99), border-right 0.3s ease;
    }

    .slogan span {
      display: inline-block;
    }

    .slogan.typing-done {
      border-right: none;
    }

    @keyframes blink-caret {

      from,
      to {
        border-color: transparent;
      }

      50% {
        border-color: #0099ff;
      }
    }

    .tab {
      display: flex;
      position: fixed;
      background-color: rgba(34, 34, 34, 0.75);
      width: 100%;
      margin: 0;
      left: 0;
      top: 0;
      height: 60px;
      padding: 10px 0;
      justify-content: space-between;
      z-index: 1000;
      animation: slideDown 0.6s ease-out;
    }

    @keyframes slideDown {
      from {
        transform: translateY(-100%);
        opacity: 0;
      }

      to {
        transform: translateY(0);
        opacity: 1;
      }
    }

    .page {
      position: relative;
      min-height: calc(100vh - 60px);
      padding-top: 60px;
      animation: fadeIn 0.4s ease-out;
      width: 100%;
      overflow-x: hidden;
      z-index: 1;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(10px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    #tabLogo {
      height: 40px;

    .tabButtonTab {

    .tabButton {

      text-decoration: none;
      font-size: 14px;

    .tabButton:hover {
      background-color: #333;
    }

    .tabButton a {
      text-decoration: none;
      color: #eee;
    }

    .proxy-selector {

      display: inline-block;
      height: 100%;
    }

    .proxy-btn {

      color: #eee;
      border: 0;

      border-radius: 10px;

      gap: 5px;

    }

    .proxy-arrow {

    }

    .proxy-menu {
      display: none;
      position: absolute;
      top: calc(100% + 5px);
      right: 0;
      background: rgba(35,35,35,0.98);
      backdrop-filter: blur(15px);
      min-width: 180px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.5);
      border-radius: 10px;
      z-index: 1000;
      overflow: hidden;
      opacity: 0;
      transform: translateY(-8px);
      transition: all 0.2s ease;
    }

    .proxy-menu.show {
      display: block;
      opacity: 1;
      transform: translateY(0);
    }

    .proxy-option {
      padding: 11px 16px;
      cursor: pointer;
      transition: all 0.2s ease;
      display: flex;
      justify-content: space-between;
      align-items: center;
      color: #ddd;

      border-left: 3px solid transparent;
    }

    .proxy-option:hover {

    .proxy-option.active {

    .proxy-option .check {

    .other-selector {

    }

    .other-btn {

    .download-section {
      position: relative;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 80px 20px;
      min-height: calc(100vh - 60px);
      z-index: -1;
    }

    .download-title {
      color: var(--text-primary);
      font-size: 2.5rem;
      font-weight: bold;
      margin-bottom: 50px;
      text-align: center;
      font-family: "Mi Sans", "Segoe UI", "Microsoft YaHei", "PingFang SC", -apple-system, BlinkMacSystemFont, sans-serif;
    }

    .download-cards {
      position: relative;
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 30px;
      max-width: 1000px;
      z-index: -1;
    }

    .download-card {
      background-color: var(--bg-secondary);
      border-radius: 15px;
      padding: 40px 50px;
      width: 200px;
      display: flex;
      flex-direction: column;
      align-items: center;
      cursor: pointer;
      transition: all 0.3s ease;
      box-shadow: none;
      z-index: 0;
    }

    .fade-in-up {
      animation: fadeInUp 0.6s ease-out forwards;
      opacity: 0;
    }

    @keyframes fadeInUp {
      from {
        opacity: 0;
        transform: translateY(30px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .download-card:hover {
      transform: translateY(-10px);
      background-color: var(--bg-secondary);
      filter: brightness(1.1);
      box-shadow: 0 8px 20px rgba(0, 0, 0, 0.3);
    }

    .download-name {
      color: var(--text-primary);
      font-size: 1.3rem;
      font-weight: bold;
      margin-bottom: 10px;
      font-family: "Mi Sans", "Segoe UI", "Microsoft YaHei", "PingFang SC", -apple-system, BlinkMacSystemFont, sans-serif;
    }

    .download-desc {
      color: var(--text-secondary);
      font-size: 0.9rem;
      text-align: center;
      font-family: "Mi Sans", "Segoe UI", "Microsoft YaHei", "PingFang SC", -apple-system, BlinkMacSystemFont, sans-serif;
    }

    .download-panel {
      visibility: hidden;
      opacity: 0;
      max-height: 0;
      width: 100%;
      background: linear-gradient(180deg, var(--bg-color) 0%, var(--bg-secondary) 100%);
      backdrop-filter: blur(20px);
      padding: 0 0;
      margin-top: 15px;
      border-radius: 10px;
      box-shadow: 0 10px 40px rgba(0,0,0,0.3);
      overflow: hidden;
      transition: visibility 0.25s ease, opacity 0.25s ease, max-height 0.25s ease, padding 0.25s ease;
      z-index: 2;
    }

    .download-panel.show {
      visibility: visible;
      opacity: 1;
      max-height: 500px;
      padding: 15px 0;
      z-index: 2;
    }

    .download-panel-inner {
      max-width: 1200px;
      margin: 0 auto;
      padding: 0 20px;
      z-index: 2;
    }

    .filter-tabs {
      display: flex;
      gap: 8px;
      margin-bottom: 15px;
      flex-wrap: wrap;
      align-items: center;
    }

    .filter-tab {
      background: var(--bg-secondary);
      border: none;
      border-radius: 6px;
      padding: 6px 14px;
      cursor: pointer;
      font-size: 13px;
      color: var(--text-secondary);
      transition: all 0.2s ease;
    }

    .filter-tab:hover {
      background: var(--bg-color);
      color: var(--text-primary);
    }

    .filter-tab.active {
      background: var(--accent-color, #0099ff);
      color: #fff;
      border-color: var(--accent-color, #0099ff);
    }

    .download-panel-title {
      color: var(--text-secondary);
      font-size: 12px;
      margin-bottom: 15px;
      text-transform: uppercase;
      letter-spacing: 1px;
      z-index: 2;
    }

    .download-items {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      z-index: 2;
    }

    .download-item {
      flex: 1 1 calc(33.333% - 10px);
      min-width: 280px;
      background: var(--bg-secondary);
      border-radius: 8px;
      padding: 15px 20px;
      cursor: pointer;
      transition: all 0.25s ease;
      display: flex;
      align-items: center;
      justify-content: space-between;
      z-index: 2;
    }

    .download-item:hover {
      background: rgba(0,153,255,0.15);
      border-color: #0099ff;
      transform: translateY(-2px);
      box-shadow: 0 5px 20px rgba(0,153,255,0.2);
    }

    .download-item-name {
      color: var(--text-primary);
      font-size: 14px;
      font-weight: 600;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      z-index: 2;
    }

    .download-item-size {
      color: var(--text-secondary);
      font-size: 12px;
      white-space: nowrap;
      z-index: 2;
    }

    .download-item:hover .download-item-size {
      color: #0099ff;
    }

    .download-card {
      position: relative;
      background-color: var(--bg-secondary);
      border-radius: 15px;
      padding: 40px 50px;
      width: 200px;
      display: flex;
      flex-direction: column;
      align-items: center;
      cursor: pointer;
      transition: all 0.3s ease;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
    }

    .download-card.expanded {
      background-color: var(--bg-secondary);
      filter: brightness(1.1);
      transform: translateY(-5px);
    }

    .download-card.active {
      background-color: var(--bg-secondary);
      filter: brightness(1.1);
      transform: translateY(-5px);
      box-shadow: 0 10px 30px rgba(0,0,0,0.5);
    }

    .download-card::after {
      content: '▼';
      position: absolute;
      bottom: 15px;
      font-size: 10px;
      color: #666;
      transition: transform 0.3s ease;
    }

    .download-card.expanded::after {
      transform: rotate(180deg);
      color: #0099ff;
    }

    @media (max-width: 768px) {
      .download-cards {
        flex-direction: column;
        align-items: center;

    init() {
      window.addEventListener("mousemove", this.move.bind(this));

    },
    move(e) {
      let x = e.clientX;
      let y = e.clientY;
      if (this.current_target) {
        const rect = this.current_target.getBoundingClientRect();
        const center_x = rect.left + rect.width / 2;
        const center_y = rect.top + rect.height / 2;
        x = center_x + (x - center_x) * 0.05;
        y = center_y + (y - center_y) * 0.05;
      }
      this.container.style.transform = `translate(${x}px, ${y}px)`;
    },
    bind_targets_events() {
      const targets = document.querySelectorAll("a, button, .featureCard, .OnlineButton, .DesktopButton, .tabButton, .download-card, .download-item");
      targets.forEach(ele => {
        ele.classList.add("magnetic-target");
        ele.onmouseenter = () => {
          this.current_target = ele;
          const rect = ele.getBoundingClientRect();
          this.container.style.setProperty("--width", rect.width + innerWidth / 50 + "px");
          this.container.style.setProperty("--height", rect.height + innerWidth / 50 + "px");
        };
        ele.onmouseleave = () => {
          this.current_target = null;
          this.container.style.setProperty("--width", "2.5rem");
          this.container.style.setProperty("--height", "2.5rem");
        };
      });
    }
  };

  let currentArch = 'all';
  let currentSuffix = 'all';

  function detectArch(filename, platform) {
    const name = filename.toLowerCase();
    if (platform === 'windows') {
      if (name.includes('amd64') || name.includes('x86_64') || name.includes('x64') || name.includes('64bit') || name.includes('win64')) return 'x64';
      if (name.includes('i386') || name.includes('i686') || name.includes('x86') || name.includes('win32') || name.includes('ia32')) return 'x86';
      if (name.includes('arm64') || name.includes('aarch64')) return 'arm64';
      return 'x64';
    } else if (platform === 'macos') {
      if (name.includes('arm64') || name.includes('aarch64') || name.includes('apple-silicon') || name.includes('macos-arm')) return 'arm';
      if (name.includes('x64') || name.includes('x86_64') || name.includes('intel') || name.includes('macos-x64')) return 'x64';
      return 'x64';
    } else {
      if (name.includes('amd64') || name.includes('x86_64') || name.includes('x64') || name.includes('64bit')) return 'amd';
      if (name.includes('arm64') || name.includes('aarch64') || name.includes('armv8')) return 'arm';
      if (name.includes('armhf') || name.includes('armv7') || name.includes('armv6') || name.includes('rpi') || name.includes('hf')) return 'arm32';
      return 'amd';
    }
  }

  function detectSuffix(filename, platform) {
    const name = filename.toLowerCase();
    if (platform === 'windows') {
      if (name.endsWith('.exe')) return 'exe';
      if (name.endsWith('.msi')) return 'msi';
      if (name.endsWith('.appx') || name.endsWith('.appxBundle')) return 'appx';
      if (name.endsWith('.zip')) return 'zip';
      return 'other';
    } else if (platform === 'macos') {
      if (name.endsWith('.dmg')) return 'dmg';
      if (name.endsWith('.pkg')) return 'pkg';
      if (name.endsWith('.zip')) return 'zip';
      return 'other';
    } else {
      if (name.endsWith('.deb')) return 'deb';
      if (name.endsWith('.rpm')) return 'rpm';
      if (name.endsWith('.appimage') || name.includes('appimage')) return 'appimage';
      if (name.endsWith('.tar.gz') || name.endsWith('.tgz')) return 'tar';
      if (name.endsWith('.tar.xz') || name.endsWith('.txz')) return 'tarxz';
      if (name.endsWith('.sh') || name.includes('-sh-')) return 'sh';
      if (name.endsWith('.bin')) return 'bin';
      if (name.endsWith('.zip')) return 'zip';
      return 'other';
    }
  }

  function selectFilter(value) {
    const archValues = ['amd', 'arm', 'arm32', 'x64', 'x86', 'arm64'];
    const suffixValues = ['all', 'deb', 'rpm', 'appimage', 'tar', 'tarxz', 'sh', 'bin', 'zip', 'exe', 'msi', 'dmg', 'pkg', 'appx'];

    document.querySelectorAll('.filter-tab').forEach(tab => {
      const tabValue = tab.getAttribute('data-i18n');
      if (tabValue === value) {
        tab.classList.add('active');
      } else {
        tab.classList.remove('active');
      }
    });

    if (value === 'all') {
      currentArch = 'all';
      currentSuffix = 'all';
    } else if (archValues.includes(value)) {
      currentArch = value;
      currentSuffix = 'all';
    } else if (suffixValues.includes(value)) {
      currentSuffix = value;
    }

    filterDownloadItems();
  }

  async function loadDownloadsWithProxy() {
    try {
      const response = await fetch('public/releases.json');
      const data = await response.json();

      if (!data.hasRelease || !data.release) {
        document.getElementById('download-cards').innerHTML = '<p style="color:#888;text-align:center;">暂无下载资源</p>';
        return;
      }

      const proxyPrefix = getProxyPrefix();
      const categorized = {
        windows: [],
        macos: [],
        linux: [],
        source: []
      };

      data.release.assets.forEach(asset => {
        const name = asset.name.toLowerCase();
        const proxiedUrl = proxyPrefix ? proxyPrefix + asset.original_url : asset.original_url;
        const assetWithProxy = { ...asset, proxied_url: proxiedUrl };
        if (name.includes('.exe') || name.includes('.appx') || name.includes('windows')) {
          categorized.windows.push(assetWithProxy);
        } else if (name.includes('.dmg') || name.includes('macos')) {
          categorized.macos.push(assetWithProxy);
        } else if (name.includes('.appimage') || name.includes('.deb') || name.includes('.rpm') || name.includes('linux')) {
          categorized.linux.push(assetWithProxy);
        } else if (name.includes('source') || name.includes('源码') || name.includes('.tar.gz')) {
          categorized.source.push(assetWithProxy);
        }
      });

      downloadData = categorized;

      const cards = [
        { key: 'windows', name: 'Windows', assets: categorized.windows },
        { key: 'macos', name: 'macOS', assets: categorized.macos },
        { key: 'linux', name: 'Linux', assets: categorized.linux },
        { key: 'source', name: translations[currentLang]['源码'], assets: categorized.source }
      ];

      let html = '';
      let delay = 0.1;
      cards.forEach(card => {
        if (card.assets.length > 0 || card.key === 'source') {
          html += `<div class="download-card fade-in-up magnetic-target" style="animation-delay: ${delay}s" onclick="switchPlatform('${card.key}')">`;
          html += `<div class="download-name" data-i18n="${card.key === 'source' ? '源码' : ''}">${card.name}</div>`;
          html += '</div>';
          delay += 0.1;
        }
      });

      html += `<div class="download-panel" id="download-panel">`;
      html += `<div class="download-panel-inner">`;
      html += `<div class="download-panel-title" id="download-panel-title" ></div>`;
      html += `<div class="download-items" id="download-items"></div>`;
      html += '</div></div>';

      document.getElementById('download-cards').innerHTML = html;

      if (typeof initPointer === 'function') {
        initPointer();
      }
    } catch (err) {
      console.error('加载下载数据失败:', err);
      document.getElementById('download-cards').innerHTML = `<p style="color:#888;text-align:center;">${translations[currentLang]['加载失败，请刷新重试']}</p>`;
    }
  }

  const bubbleSettings = {
    count: Math.floor((window.innerWidth * window.innerHeight) / 50000),
    minSize: 20,
    maxSize: 60,
    maxSpeed: 1.8,
    damping: 0.998,
    scrollInfluence: 0.5,
    colors: ['#66ccff', '#88ddff', '#aaeeff', '#99ddff', '#77bbff']
  };

  let bubbles = [];
  let animationId = null;
  let lastFrameTime = 0;
  const targetFPS = 60;
  const frameInterval = 1000 / targetFPS;
  let scrollVelocityX = 0;
  let scrollVelocityY = 0;
  let lastScrollX = 0;
  let lastScrollY = 0;
  let mouseX = -1000;
  let mouseY = -1000;

  function handleScroll() {
    scrollVelocityX = (window.scrollX - lastScrollX) * 0.1;
    scrollVelocityY = (window.scrollY - lastScrollY) * 0.1;
    lastScrollX = window.scrollX;
    lastScrollY = window.scrollY;
  }

  function handleMouseMove(e) {
    mouseX = e.clientX;
    mouseY = e.clientY;
  }

  window.addEventListener('scroll', handleScroll, { passive: true });
  window.addEventListener('mousemove', handleMouseMove);

  function createBubble() {
    const container = document.getElementById('bubbles-container');
    if (!container) return null;

    const bubble = document.createElement('div');
    bubble.className = 'bubble';

    const size = bubbleSettings.minSize + Math.random() * (bubbleSettings.maxSize - bubbleSettings.minSize);
    const x = Math.random() * (window.innerWidth - size);
    const y = Math.random() * (window.innerHeight - size);

    bubble.style.width = size + 'px';
    bubble.style.height = size + 'px';
    bubble.style.left = x + 'px';
    bubble.style.top = y + 'px';
    bubble.style.background = `radial-gradient(circle at 30% 30%, ${bubbleSettings.colors[Math.floor(Math.random() * bubbleSettings.colors.length)]}88, ${bubbleSettings.colors[Math.floor(Math.random() * bubbleSettings.colors.length)]}44)`;

    const bubbleData = {
      element: bubble,
      x: x,
      y: y,
      vx: (Math.random() - 0.5) * bubbleSettings.maxSpeed * 4,
      vy: (Math.random() - 0.5) * bubbleSettings.maxSpeed * 4,
      size: size,
      opacity: 0.6 + Math.random() * 0.4
    };

    bubble.addEventListener('click', () => popBubble(bubbleData));
    container.appendChild(bubble);

    return bubbleData;
  }

  function popBubble(bubbleData) {
    if (!bubbleData.element.parentNode) return;
    bubbleData.element.classList.add('popping');
    setTimeout(() => {
      if (bubbleData.element.parentNode) {
        bubbleData.element.parentNode.removeChild(bubbleData.element);
      }
      const index = bubbles.indexOf(bubbleData);
      if (index > -1) bubbles.splice(index, 1);

      setTimeout(() => {
        if (bubbles.length < bubbleSettings.count) {
          bubbles.push(createBubble());
        }
      }, 500);
    }, 300);
  }

  function updateBubbles(timestamp) {
    if (!lastFrameTime) lastFrameTime = timestamp;
    const elapsed = timestamp - lastFrameTime;
    if (elapsed < frameInterval) {
      animationId = requestAnimationFrame(updateBubbles);
      return;
    }
    lastFrameTime = timestamp - (elapsed % frameInterval);

    const container = document.getElementById('bubbles-container');
    if (!container) return;

    container.style.position = 'fixed';
    container.style.top = '0';
    container.style.left = '0';
    container.style.right = '0';
    container.style.bottom = '0';

    scrollVelocityX *= 0.95;
    scrollVelocityY *= 0.95;

    bubbles.forEach(b => {
      const bubbleCenterX = b.x + b.size / 2;
      const bubbleCenterY = b.y + b.size / 2;
      const dx = bubbleCenterX - mouseX;
      const dy = bubbleCenterY - mouseY;
      const distance = Math.sqrt(dx * dx + dy * dy);
      const repelRadius = b.size * 3;

      const targetElements = document.querySelectorAll('.download-card, .download-panel, .download-item');
      targetElements.forEach(target => {
        const rect = target.getBoundingClientRect();
        if (bubbleCenterX >= rect.left && bubbleCenterX <= rect.right &&
            bubbleCenterY >= rect.top && bubbleCenterY <= rect.bottom) {
          popBubble(b);
        }
      });

      if (distance < repelRadius && distance > 0) {
        const force = (repelRadius - distance) / repelRadius * 0.8;
        b.vx += (dx / distance) * force;
        b.vy += (dy / distance) * force;
      }

      b.vx *= bubbleSettings.damping;
      b.vy *= bubbleSettings.damping;

      b.vx += scrollVelocityX * bubbleSettings.scrollInfluence;
      b.vy += scrollVelocityY * bubbleSettings.scrollInfluence;

      if (Math.abs(b.vx) < 0.02) b.vx += (Math.random() - 0.5) * 0.05;
      if (Math.abs(b.vy) < 0.02) b.vy += (Math.random() - 0.5) * 0.05;

      const maxSpeed = bubbleSettings.maxSpeed;
      if (Math.abs(b.vx) > maxSpeed) b.vx = Math.sign(b.vx) * maxSpeed;
      if (Math.abs(b.vy) > maxSpeed) b.vy = Math.sign(b.vy) * maxSpeed;

      b.x += b.vx;
      b.y += b.vy;

      if (b.x < -b.size * 2) b.x = window.innerWidth + b.size;
      if (b.x > window.innerWidth + b.size * 2) b.x = -b.size;
      if (b.y < -b.size * 2) b.y = window.innerHeight + b.size;
      if (b.y > window.innerHeight + b.size * 2) b.y = -b.size;

      b.element.style.left = b.x + 'px';
      b.element.style.top = b.y + 'px';
    });

    animationId = requestAnimationFrame(updateBubbles);
  }

  function initBubbles() {
    const container = document.getElementById('bubbles-container');
    if (!container) return;

    if (animationId) cancelAnimationFrame(animationId);
    container.innerHTML = '';
    bubbles = [];

    for (let i = 0; i < bubbleSettings.count; i++) {
      const b = createBubble();
      if (b) {
        b.x = Math.random() * (window.innerWidth - b.size);
        b.y = Math.random() * (window.innerHeight - b.size);
        b.element.style.left = b.x + 'px';
        b.element.style.top = b.y + 'px';
        bubbles.push(b);
      }
    }

    updateBubbles();
  }

  document.addEventListener('DOMContentLoaded', function() {
    initProxyMenu();
    applyTheme();
    applyLang();
    loadDownloadsWithProxy();
    initBubbles();
  });

  window.addEventListener('resize', function() {
    bubbleSettings.count = Math.floor((window.innerWidth * window.innerHeight) / 50000);
  });

  document.addEventListener('click', function(event) {
    if (!event.target.closest('.dropdown')) {
      document.querySelectorAll('.dropdown.show').forEach(el => el.classList.remove('show'));
    }
    if (!event.target.closest('.proxy-selector')) {
      document.querySelectorAll('.proxy-menu.show').forEach(el => el.classList.remove('show'));
    }
    if (!event.target.closest('.other-selector')) {
      document.querySelectorAll('.other-menu.show').forEach(el => el.classList.remove('show'));
    }
    if (!event.target.closest('.download-card') && !event.target.closest('.download-panel')) {
      hideDownloadPanel();
    }
  });

  function animateToPage(url) {
    const loadingContainer = document.querySelector(".loading");
    if (loadingContainer) loadingContainer.classList.remove("loading_out");
    setTimeout(() => {
      window.location.href = url;
    }, 1000);
  }

  window.addEventListener("load", () => {
    const loadingContainer = document.querySelector(".loading");
    if (loadingContainer) loadingContainer.classList.add("loading_out");
  });
</script>

</html>
